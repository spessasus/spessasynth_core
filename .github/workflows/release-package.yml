name: Publish the npm package

on:
    push:
        tags:
            - "v*"

    workflow_dispatch:

jobs:
    publish-npm:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write
            id-token: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: latest
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: npm ci

            # These depend on the `speaker` package which will not install in CI environments
            - name: Remove Examples
              # Leave tsconfig.json so it compiles
              run: |
                  find examples/ -type f ! -name '*.json' -delete

            - name: Build and publish to npm registry
              run: npm publish --provenance --access public
